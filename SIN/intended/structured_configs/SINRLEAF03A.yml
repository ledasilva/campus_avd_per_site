hostname: SINRLEAF03A
interface_profiles:
- name: IP-PUSHED_CONFIG
  commands:
  - switchport
  - switchport trunk native vlan 100
  - switchport trunk allowed vlan 200
  - switchport mode trunk
  - spanning-tree portfast
  - dot1x host-mode multi-host
ip_igmp_snooping:
  globally_enabled: true
ip_routing: true
ip_tacacs:
  vrfs:
  - name: MGMT
    source_interface: Management1
ip_virtual_router_mac_address: 00:1c:73:00:00:99
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.3/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.255.1.3/32
- name: Loopback2
  description: DIAG_VRF_TEST_VRF
  shutdown: false
  vrf: TEST_VRF
  ip_address: 10.255.1.3/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 10.120.34.91/24
  type: oob
metadata:
  is_deployed: true
  platform: CCS-758
  dc_name: SIN
  fabric_name: SIN
ntp:
  local_interface:
    name: Management1
    vrf: MGMT
  servers:
  - name: 10.30.1.10
    preferred: true
  - name: 10.30.1.11
  vrf: MGMT
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/24 eq 32
  - sequence: 20
    action: permit 10.255.1.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65203'
  router_id: 10.255.0.3
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.2.8
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65200'
    metadata:
      peer: SINRSPINE01A
    description: SINRSPINE01A_Ethernet3
  - ip_address: 10.255.2.10
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65200'
    metadata:
      peer: SINRSPINE02A
    description: SINRSPINE02A_Ethernet3
  - ip_address: 10.255.0.5
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65200'
    metadata:
      peer: SINRSPINE01A
    description: SINRSPINE01A_Loopback0
  - ip_address: 10.255.0.6
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65200'
    metadata:
      peer: SINRSPINE02A
    description: SINRSPINE02A_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 10
    metadata:
      tenants:
      - SIN_TENANT
    rd: 10.255.0.3:20010
    route_targets:
      both:
      - 20010:20010
    redistribute_routes:
    - learned
  - id: 20
    metadata:
      tenants:
      - SIN_TENANT
    rd: 10.255.0.3:20020
    route_targets:
      both:
      - 20020:20020
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: TEST_VRF
    rd: 10.255.0.3:1
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '1:1'
      export:
      - address_family: evpn
        route_targets:
        - '1:1'
    router_id: 10.255.0.3
    redistribute:
      connected:
        enabled: true
service_routing_protocols_model: multi-agent
snmp_server:
  contact: Global Network Operations Center <gnoc@example.com>
  location: Global Campus Fabric
  communities:
  - name: ro-community-string
    access: ro
  - name: rw-community-string
    access: rw
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 32768
tacacs_servers:
  hosts:
  - host: 10.30.1.50
    vrf: MGMT
    key: ENCRYPTED_KEY
  - host: 10.30.1.51
    vrf: MGMT
    key: ENCRYPTED_KEY
  policy_unknown_mandatory_attribute_ignore: false
transceiver_qsfp_default_mode_4x10: true
virtual_source_nat_vrfs:
- name: TEST_VRF
  ip_address: 10.255.1.3
vlan_interfaces:
- name: Vlan10
  description: SIN_Test_VLAN
  shutdown: false
  vrf: TEST_VRF
  ip_address_virtual: 10.0.0.1/24
  metadata:
    tenants:
    - SIN_TENANT
- name: Vlan20
  description: SIN_Access_Points
  shutdown: false
  vrf: TEST_VRF
  ip_address_virtual: 10.0.1.1/24
  metadata:
    tenants:
    - SIN_TENANT
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 10
  name: SIN_Test_VLAN
  metadata:
    tenants:
    - SIN_TENANT
- id: 20
  name: SIN_Access_Points
  metadata:
    tenants:
    - SIN_TENANT
vrfs:
- name: MGMT
  ip_routing: false
- name: TEST_VRF
  ip_routing: true
  metadata:
    tenants:
    - SIN_TENANT
vxlan_interface:
  vxlan1:
    description: SINRLEAF03A_VTEP
