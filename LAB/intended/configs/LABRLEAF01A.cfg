   no shutdown
   !
   vrf MGMT
      no shutdown
!
tacacs-server host 2.2.2.1 vrf MGMT key 7 ENCRYPTED_KEY
tacacs-server host 2.2.2.2 vrf MGMT key 7 ENCRYPTED_KEY
