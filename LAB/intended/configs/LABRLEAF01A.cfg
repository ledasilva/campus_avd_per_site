   description MLAG
   no shutdown
   mtu 9214
   no autostate
   ip address 10.255.2.0/31
!
interface Vxlan1
   description LABRLEAF01A_VTEP
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vrf TEST_VRF vni 1
!
interface profile IP-PUSHED_CONFIG
   command switchport
   command switchport trunk native vlan 100
   command switchport trunk allowed vlan 200
   command switchport mode trunk
   command spanning-tree portfast
   command dot1x host-mode multi-host
!
ip virtual-router mac-address 00:1c:73:00:00:99
!
ip address virtual source-nat vrf TEST_VRF address 10.255.1.1
!
ip routing
no ip routing vrf MGMT
ip routing vrf TEST_VRF
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.255.0.0/24 eq 32
   seq 20 permit 10.255.1.0/24 eq 32
!
ip prefix-list PL-MLAG-PEER-VRFS
   seq 10 permit 10.255.3.0/31
!
mlag configuration
   domain-id MLAG_PAIR_01
   local-interface Vlan4094
   peer-address 10.255.2.1
   peer-link Port-Channel51
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ntp local-interface vrf MGMT Management1
ntp server vrf MGMT ntp1.ntp.com prefer
ntp server vrf MGMT ntp2.ntp.com
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
route-map RM-CONN-2-BGP-VRFS deny 10
   match ip address prefix-list PL-MLAG-PEER-VRFS
!
route-map RM-CONN-2-BGP-VRFS permit 20
!
route-map RM-MLAG-PEER-IN permit 10
   description Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
   set origin incomplete
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65101
   router-id 10.255.0.1
   update wait-install
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 256000
   neighbor MLAG-IPv4-UNDERLAY-PEER peer group
   neighbor MLAG-IPv4-UNDERLAY-PEER remote-as 65101
   neighbor MLAG-IPv4-UNDERLAY-PEER next-hop-self
   neighbor MLAG-IPv4-UNDERLAY-PEER description LABRLEAF02A
   neighbor MLAG-IPv4-UNDERLAY-PEER route-map RM-MLAG-PEER-IN in
   neighbor MLAG-IPv4-UNDERLAY-PEER send-community
   neighbor MLAG-IPv4-UNDERLAY-PEER maximum-routes 256000
   neighbor 10.255.0.5 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.5 remote-as 65100
   neighbor 10.255.0.5 description LABRSPINE01A_Loopback0
   neighbor 10.255.0.6 peer group EVPN-OVERLAY-PEERS
   neighbor 10.255.0.6 remote-as 65100
   neighbor 10.255.0.6 description LABRSPINE02A_Loopback0
   neighbor 10.255.2.0 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.2.0 remote-as 65100
   neighbor 10.255.2.0 description LABRSPINE01A_Ethernet1
   neighbor 10.255.2.2 peer group IPv4-UNDERLAY-PEERS
   neighbor 10.255.2.2 remote-as 65100
   neighbor 10.255.2.2 description LABRSPINE02A_Ethernet1
   neighbor 10.255.3.1 peer group MLAG-IPv4-UNDERLAY-PEER
   neighbor 10.255.3.1 description LABRLEAF02A_Vlan4093
   redistribute connected route-map RM-CONN-2-BGP
   !
   vlan 10
      rd 10.255.0.1:10010
      route-target both 10010:10010
      redistribute learned
   !
   vlan 20
      rd 10.255.0.1:10020
      route-target both 10020:10020
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
      neighbor MLAG-IPv4-UNDERLAY-PEER activate
   !
   vrf TEST_VRF
      rd 10.255.0.1:1
      route-target import evpn 1:1
      route-target export evpn 1:1
      router-id 10.255.0.1
      update wait-install
      neighbor 10.255.3.1 peer group MLAG-IPv4-UNDERLAY-PEER
      neighbor 10.255.3.1 description LABRLEAF02A_Vlan3000
      redistribute connected route-map RM-CONN-2-BGP-VRFS
!
ip tacacs vrf MGMT source-interface Management1
!
