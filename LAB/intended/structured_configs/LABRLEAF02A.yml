hostname: LABRLEAF02A
interface_profiles:
- name: IP-PUSHED_CONFIG
  commands:
  - switchport
  - switchport trunk native vlan 100
  - switchport trunk allowed vlan 200
  - switchport mode trunk
  - spanning-tree portfast
  - dot1x host-mode multi-host
ip_domain_lookup:
  source_interfaces:
  - name: Management1
    vrf: MGMT
ip_igmp_snooping:
  globally_enabled: true
ip_name_server:
  vrfs:
  - name: MGMT
    servers:
    - ip_address: 1.1.1.1
    - ip_address: 1.1.1.2
ip_routing: true
ip_tacacs:
  vrfs:
  - name: MGMT
    source_interface: Management1
ip_virtual_router_mac_address: 00:1c:73:00:00:99
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.2/32
- name: Loopback1
  description: VXLAN_TUNNEL_SOURCE
  shutdown: false
  ip_address: 10.255.1.1/32
- name: Loopback2
  description: DIAG_VRF_TEST_VRF
  shutdown: false
  vrf: TEST_VRF
  ip_address: 10.255.1.2/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 10.10.101.22/24
  type: oob
metadata:
  is_deployed: true
  platform: DCS-720XP-48TXH
  dc_name: LAB
  fabric_name: LAB
mlag_configuration:
  domain_id: MLAG_PAIR_01
  local_interface: Vlan4094
  peer_address: 10.255.2.0
  peer_link: Port-Channel51
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
ntp:
  local_interface:
    name: Management1
    vrf: MGMT
  servers:
  - name: ntp1.ntp.com
    preferred: true
  - name: ntp2.ntp.com
  vrf: MGMT
port_channel_interfaces:
- name: Port-Channel51
  description: MLAG_LABRLEAF01A_Port-Channel51
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/24 eq 32
  - sequence: 20
    action: permit 10.255.1.0/24 eq 32
- name: PL-MLAG-PEER-VRFS
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.3.0/31
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
- name: RM-CONN-2-BGP-VRFS
  sequence_numbers:
  - sequence: 10
    type: deny
    match:
    - ip address prefix-list PL-MLAG-PEER-VRFS
  - sequence: 20
    type: permit
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65101'
  router_id: 10.255.0.2
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65101'
    description: LABRLEAF01A
    next_hop_self: true
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.3.0
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: LABRLEAF01A
    description: LABRLEAF01A_Vlan4093
  - ip_address: 10.255.2.4
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: LABRSPINE01A
    description: LABRSPINE01A_Ethernet2
  - ip_address: 10.255.2.6
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: LABRSPINE02A
    description: LABRSPINE02A_Ethernet2
  - ip_address: 10.255.0.5
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: LABRSPINE01A
    description: LABRSPINE01A_Loopback0
  - ip_address: 10.255.0.6
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65100'
    metadata:
      peer: LABRSPINE02A
    description: LABRSPINE02A_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  vlans:
  - id: 10
    metadata:
      tenants:
      - LAB_TENANT
    rd: 10.255.0.2:10010
    route_targets:
      both:
      - 10010:10010
    redistribute_routes:
    - learned
  - id: 20
    metadata:
      tenants:
      - LAB_TENANT
    rd: 10.255.0.2:10020
    route_targets:
      both:
      - 10020:10020
    redistribute_routes:
    - learned
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
  vrfs:
  - name: TEST_VRF
    rd: 10.255.0.2:1
    route_targets:
      import:
      - address_family: evpn
        route_targets:
        - '1:1'
      export:
      - address_family: evpn
        route_targets:
        - '1:1'
    router_id: 10.255.0.2
    updates:
      wait_install: true
    neighbors:
    - ip_address: 10.255.3.0
      peer_group: MLAG-IPv4-UNDERLAY-PEER
      description: LABRLEAF01A_Vlan3000
    redistribute:
      connected:
        enabled: true
        route_map: RM-CONN-2-BGP-VRFS
service_routing_protocols_model: multi-agent
snmp_server:
  contact: Global Network Operations Center <gnoc@example.com>
  location: Global Campus Fabric
  communities:
  - name: ro-community-string
    access: ro
  - name: rw-community-string
    access: rw
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 32768
  no_spanning_tree_vlan: 4093-4094
tacacs_servers:
  hosts:
  - host: 2.2.2.1
    vrf: MGMT
    key: ENCRYPTED_KEY
  - host: 2.2.2.2
    vrf: MGMT
    key: ENCRYPTED_KEY
  policy_unknown_mandatory_attribute_ignore: false
transceiver_qsfp_default_mode_4x10: true
virtual_source_nat_vrfs:
- name: TEST_VRF
  ip_address: 10.255.1.2
vlan_interfaces:
