aaa_root:
  disabled: true
aaa_server_groups:
- name: TACACS_GROUP
  type: tacacs+
  servers:
  - server: 2.2.2.1
    vrf: MGMT
  - server: 2.2.2.2
    vrf: MGMT
clock:
  timezone: UTC
config_end: true
daemon_terminattr:
  cvaddrs:
  - 10.1.1.1:9910
  cvauth:
    method: token
    token_file: /tmp/token
  cvsourceintf: Management1
  cvvrf: MGMT
  disable_aaa: false
  smashexcludes: ale,flexCounter,hardware,kni,pulse,strata
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet1
  description: P2P_LABRLEAF01A_Ethernet50
  shutdown: false
  mtu: 9214
  ip_address: 10.255.2.2/31
  metadata:
    peer: LABRLEAF01A
    peer_interface: Ethernet50
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet2
  description: P2P_LABRLEAF02A_Ethernet50
  shutdown: false
  mtu: 9214
  ip_address: 10.255.2.6/31
  metadata:
    peer: LABRLEAF02A
    peer_interface: Ethernet50
    peer_type: l3leaf
  switchport:
    enabled: false
- name: Ethernet3
  description: P2P_LABRLEAF03A_Ethernet54
  shutdown: false
  mtu: 9214
  ip_address: 10.255.2.10/31
  metadata:
    peer: LABRLEAF03A
    peer_interface: Ethernet54
    peer_type: l3leaf
  switchport:
    enabled: false
hostname: LABRSPINE02A
ip_domain_lookup:
  source_interfaces:
  - name: Management1
    vrf: MGMT
ip_name_server:
  vrfs:
  - name: MGMT
    servers:
    - ip_address: 1.1.1.1
    - ip_address: 1.1.1.2
ip_routing: true
ip_tacacs:
  vrfs:
  - name: MGMT
    source_interface: Management1
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.6/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: MGMT
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: MGMT
  ip_address: 10.10.101.12/24
  type: oob
metadata:
  is_deployed: true
  platform: DCS-7050PX4
  dc_name: LAB
  fabric_name: LAB
ntp:
  local_interface:
    name: Management1
    vrf: MGMT
  servers:
  - name: ntp1.ntp.com
    preferred: true
  - name: ntp2.ntp.com
  vrf: MGMT
prefix_lists:
- name: PL-LOOPBACKS-EVPN-OVERLAY
  sequence_numbers:
  - sequence: 10
    action: permit 10.255.0.0/24 eq 32
route_maps:
- name: RM-CONN-2-BGP
  sequence_numbers:
  - sequence: 10
    type: permit
    match:
    - ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
router_bfd:
  multihop:
    interval: 300
    min_rx: 300
    multiplier: 3
router_bgp:
  as: '65100'
  router_id: 10.255.0.6
  maximum_paths:
    paths: 4
  updates:
    wait_install: true
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: IPv4-UNDERLAY-PEERS
    metadata:
      type: ipv4
    send_community: all
    maximum_routes: 256000
  - name: EVPN-OVERLAY-PEERS
    metadata:
      type: evpn
    next_hop_unchanged: true
    update_source: Loopback0
    bfd: true
    ebgp_multihop: 3
    send_community: all
    maximum_routes: 0
  neighbors:
  - ip_address: 10.255.2.3
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: LABRLEAF01A
    description: LABRLEAF01A_Ethernet50
  - ip_address: 10.255.2.7
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: LABRLEAF02A
    description: LABRLEAF02A_Ethernet50
  - ip_address: 10.255.2.11
    peer_group: IPv4-UNDERLAY-PEERS
    remote_as: '65103'
    metadata:
      peer: LABRLEAF03A
    description: LABRLEAF03A_Ethernet54
  - ip_address: 10.255.0.1
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: LABRLEAF01A
    description: LABRLEAF01A_Loopback0
  - ip_address: 10.255.0.2
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65101'
    metadata:
      peer: LABRLEAF02A
    description: LABRLEAF02A_Loopback0
  - ip_address: 10.255.0.3
    peer_group: EVPN-OVERLAY-PEERS
    remote_as: '65103'
    metadata:
      peer: LABRLEAF03A
    description: LABRLEAF03A_Loopback0
  redistribute:
    connected:
      enabled: true
      route_map: RM-CONN-2-BGP
  address_family_evpn:
    peer_groups:
    - name: EVPN-OVERLAY-PEERS
      activate: true
  address_family_ipv4:
    peer_groups:
    - name: IPv4-UNDERLAY-PEERS
      activate: true
    - name: EVPN-OVERLAY-PEERS
      activate: false
service_routing_protocols_model: multi-agent
snmp_server:
  contact: Global Network Operations Center <gnoc@example.com>
  location: Global Campus Fabric
  communities:
  - name: ro-community-string
    access: ro
  - name: rw-community-string
    access: rw
spanning_tree:
  mode: none
tacacs_servers:
  hosts:
  - host: 2.2.2.1
    vrf: MGMT
    key: ENCRYPTED_KEY
  - host: 2.2.2.2
    vrf: MGMT
    key: ENCRYPTED_KEY
  policy_unknown_mandatory_attribute_ignore: false
transceiver_qsfp_default_mode_4x10: true
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vrfs:
- name: MGMT
  ip_routing: false
